<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快点跑！</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --text: #2c3e50;
  --text-muted: #7f8c8d;
  --primary: #3498db;
  --primary-hover: #2980b9;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --border: #dce4ec;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}
.auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-card { background: var(--card-bg); border-radius: 16px; padding: 40px; box-shadow: var(--shadow); width: 100%; max-width: 420px; }
.auth-title { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px; color: var(--primary); }
.auth-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }
.auth-form input {
  width: 100%; padding: 14px 16px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 16px; margin-bottom: 16px; transition: border-color 0.2s;
  background: white; color: var(--text);
}
.auth-form input:focus { outline: none; border-color: var(--primary); }
.auth-btn {
  width: 100%; padding: 14px; background: var(--primary); color: white;
  border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.auth-btn:hover { background: var(--primary-hover); }
.auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.auth-switch { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px; }
.auth-switch a { color: var(--primary); cursor: pointer; text-decoration: none; }
.auth-msg { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
.auth-msg.error { background: #fee; color: var(--danger); }
.auth-msg.success { background: #e8f8f5; color: var(--success); }
.auth-msg.info { background: #e8f4f8; color: var(--primary); }

.migrate-banner {
  background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px;
  padding: 16px; margin-bottom: 20px; text-align: center;
}
.migrate-banner p { margin-bottom: 8px; font-size: 14px; }
.migrate-banner .btn { margin: 4px; }

.app-container { display: none; }
.header { background: var(--card-bg); padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header-title { font-size: 24px; font-weight: 700; color: var(--primary); }
.header-user { display: flex; align-items: center; gap: 12px; }
.user-name { font-size: 14px; color: var(--text-muted); }
.logout-btn { padding: 8px 16px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.logout-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
.tabs { display: flex; background: var(--card-bg); padding: 0 24px; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 14px 24px; background: transparent; border: none; font-size: 16px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn:hover { color: var(--text); }
.main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }
.card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-size: 18px; font-weight: 600; }

.btn { display: inline-block; padding: 10px 16px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #219a52; }
.btn-warning { background: var(--warning); color: white; }
.btn-warning:hover { background: #d68910; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; transition: border-color 0.2s; background: white; color: var(--text); }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-row { display: flex; gap: 16px; flex-wrap: wrap; }
.form-row .form-group { flex: 1; min-width: 150px; }

.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--bg); font-weight: 600; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
tr:hover { background: var(--bg); }

.status-tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.status-pending { background: #fef5e7; color: var(--warning); }
.status-submitted { background: #e8f4f8; color: var(--primary); }
.status-screening { background: #e8f6f3; color: var(--success); }
.status-interview { background: #e8f4f8; color: #16a085; }
.status-offer { background: #e8f8f5; color: var(--success); }
.status-accepted { background: #d4edda; color: #155724; }
.status-rejected { background: #f8d7da; color: #721c24; }

.interview-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.interview-tag { background: var(--bg); padding: 4px 8px; border-radius: 4px; font-size: 11px; color: var(--text-muted); border: 1px solid var(--border); }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card { background: var(--card-bg); border-radius: 12px; padding: 16px; text-align: center; box-shadow: var(--shadow); }
.stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal { background: var(--card-bg); border-radius: 16px; padding: 24px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 20px; font-weight: 600; }
.modal-close { background: transparent; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; padding: 4px; }

.search-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
.filter-select { padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; }

.file-upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
.file-upload-area:hover { border-color: var(--primary); background: var(--bg); }
.file-upload-area.has-file { border-color: var(--success); background: #e8f8f5; }
.file-upload-icon { font-size: 32px; color: var(--text-muted); margin-bottom: 8px; }
.file-upload-text { font-size: 14px; color: var(--text-muted); }
.file-name { font-size: 14px; color: var(--success); font-weight: 500; }
.file-input { display: none; }

.resume-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; }
.resume-info { flex: 1; }
.resume-version { font-size: 16px; font-weight: 600; color: var(--text); }
.resume-date { font-size: 12px; color: var(--text-muted); }
.resume-summary { font-size: 13px; color: var(--text); margin-top: 4px; }
.resume-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.hidden { display: none; }
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-4 { margin-bottom: 16px; }

@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .header-title { font-size: 20px; }
  .tabs { padding: 0 16px; }
  .tab-btn { padding: 12px 16px; font-size: 14px; }
  .main-content { padding: 16px; }
  .card { padding: 16px; }
  .form-row { flex-direction: column; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  table { font-size: 12px; }
  th, td { padding: 8px; }
  .modal { padding: 16px; }
}
</style>
</head>
<body>

<!-- Auth Page -->
<div id="authPage" class="auth-container">
  <div class="auth-card">
    <div class="auth-title">快点跑！</div>
    <div class="auth-subtitle">云端同步 · 登录即同步所有设备</div>
    
    <div id="authMsg" class="auth-msg"></div>
    
    <!-- Login -->
    <div id="loginForm" class="auth-form">
      <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="email">
      <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
      <button class="auth-btn" id="loginBtn" type="button">登录</button>
      <div class="auth-switch">还没有账号？ <a href="#" id="switchToRegister">注册</a></div>
    </div>
    
    <!-- Register -->
    <div id="registerForm" class="auth-form hidden">
      <input type="email" id="regEmail" placeholder="邮箱" autocomplete="email">
      <input type="password" id="regPassword" placeholder="密码（至少 6 位）" autocomplete="new-password">
      <input type="password" id="regPasswordConfirm" placeholder="确认密码" autocomplete="new-password">
      <button class="auth-btn" id="regBtn" type="button">注册</button>
      <div class="auth-switch">已有账号？ <a href="#" id="switchToLogin">返回登录</a></div>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="appPage" class="app-container">
  <div class="header">
    <div class="header-title">快点跑！</div>
    <div class="header-user">
      <span class="user-name" id="currentUser"></span>
      <button class="logout-btn" id="logoutBtn" type="button">退出</button>
    </div>
  </div>
  
  <!-- Migration Banner -->
  <div id="migrateBanner" class="migrate-banner hidden">
    <p><strong>检测到旧版数据！</strong></p>
    <p>发现 <span id="migrateCount"></span> 条投递记录和 <span id="migrateResumeCount"></span> 份简历，是否迁移到云端？</p>
    <button class="btn btn-warning" id="migrateBtn" type="button">迁移数据</button>
    <button class="btn btn-secondary btn-sm" id="dismissMigrateBtn" type="button">暂不迁移</button>
  </div>
  
  <div class="tabs">
    <button class="tab-btn active" id="tabJobs" type="button">🎯 投递管理</button>
    <button class="tab-btn" id="tabResumes" type="button">📄 简历管理</button>
  </div>
  
  <div class="main-content">
    <div id="jobsTab">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="search-bar">
        <input type="text" class="search-input" id="jobSearch" placeholder="搜索公司、职位...">
        <select class="filter-select" id="statusFilter">
          <option value="">全部状态</option>
          <option value="pending">待投递</option><option value="submitted">已投递</option><option value="screening">简历初筛</option>
          <option value="interview">面试中</option><option value="offer">Offer</option><option value="accepted">已接受</option><option value="rejected">已拒绝</option>
        </select>
        <button class="btn btn-primary" id="addJobBtn" type="button">+ 添加投递</button>
      </div>
      <div class="card"><div class="table-container"><table id="jobsTable"><thead><tr><th>公司</th><th>职位</th><th>薪资</th><th>地点</th><th>状态</th><th>投递日期</th><th>面试记录</th><th>操作</th></tr></thead><tbody id="jobsBody"><tr><td colspan="8" class="text-center text-muted">加载中...</td></tr></tbody></table></div></div>
    </div>
    <div id="resumesTab" class="hidden">
      <div class="card">
        <div class="card-header"><div class="card-title">简历版本列表</div><button class="btn btn-primary" id="addResumeBtn" type="button">+ 新增简历</button></div>
        <div id="resumesList"><p class="text-center text-muted">加载中...</p></div>
      </div>
      <div class="card mt-4"><div class="card-title mb-4">数据说明</div><p class="text-muted">简历文件存储在 Supabase 云端，单个文件建议不超过 5MB。支持 PDF、Word、图片等格式。</p></div>
    </div>
  </div>
</div>

<!-- Job Modal -->
<div id="jobModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="jobModalTitle">添加投递记录</div><button class="modal-close" id="closeJobModal" type="button">&times;</button></div>
    <div class="form-group"><label class="form-label">公司名称 *</label><input type="text" class="form-input" id="jobCompany" required></div>
    <div class="form-row"><div class="form-group"><label class="form-label">职位名称 *</label><input type="text" class="form-input" id="jobPosition" required></div><div class="form-group"><label class="form-label">薪资范围</label><input type="text" class="form-input" id="jobSalary" placeholder="如: 20-30K"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">工作地点</label><input type="text" class="form-input" id="jobLocation"></div><div class="form-group"><label class="form-label">投递日期</label><input type="date" class="form-input" id="jobDate"></div></div>
    <div class="form-group"><label class="form-label">投递链接</label><input type="url" class="form-input" id="jobLink" placeholder="https://..."></div>
    <div class="form-row"><div class="form-group"><label class="form-label">状态</label><select class="form-select" id="jobStatus"><option value="pending">待投递</option><option value="submitted">已投递</option><option value="screening">简历初筛</option><option value="interview">面试中</option><option value="offer">Offer</option><option value="accepted">已接受</option><option value="rejected">已拒绝</option></select></div><div class="form-group"><label class="form-label">联系人</label><input type="text" class="form-input" id="jobContact"></div></div>
    <div class="form-group"><label class="form-label">面试记录</label><textarea class="form-textarea" id="jobInterview" placeholder="格式: 一面 2026-05-20 | 二面 2026-05-25"></textarea></div>
    <div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" id="jobNotes"></textarea></div>
    <input type="hidden" id="jobEditId">
    <button class="btn btn-primary" style="width:100%" id="jobSaveBtn" type="button">保存</button>
  </div>
</div>

<!-- Resume Modal -->
<div id="resumeModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="resumeModalTitle">新增简历版本</div><button class="modal-close" id="closeResumeModal" type="button">&times;</button></div>
    <div class="form-group"><label class="form-label">版本号 *</label><input type="text" class="form-input" id="resumeVersion" placeholder="如: v1.0"></div>
    <div class="form-group"><label class="form-label">更新日期</label><input type="date" class="form-input" id="resumeDate"></div>
    <div class="form-group"><label class="form-label">修改摘要</label><textarea class="form-textarea" id="resumeSummary" placeholder="本次更新的主要内容..."></textarea></div>
    <div class="form-group"><label class="form-label">简历文件</label>
      <div class="file-upload-area" id="fileUploadArea"><div class="file-upload-icon">📎</div><div class="file-upload-text" id="fileUploadText">点击上传或拖拽文件</div><div class="file-name" id="fileNameDisplay"></div></div>
      <input type="file" class="file-input" id="resumeFile">
    </div>
    <input type="hidden" id="resumeEditId">
    <button class="btn btn-primary" style="width:100%" id="resumeSaveBtn" type="button">保存</button>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal-overlay">
  <div class="modal"><div class="modal-header"><div class="modal-title" id="detailTitle">投递详情</div><button class="modal-close" id="closeDetailModal" type="button">&times;</button></div><div id="detailContent"></div></div>
</div>

<script>
(function() {
// ==================== Supabase ====================
var SUPABASE_URL = 'https://sbthqgovzodhypecoddm.supabase.co';
var SUPABASE_KEY = 'sb_publishable_ZCrk4VcdTp4vhjHqbNhPoQ__dQgzIpr';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==================== DOM refs ====================
var $ = function(id) { return document.getElementById(id); };

// ==================== Auth UI ====================
var currentJobs = [];
var currentResumes = [];

function showMsg(type, text) {
  var el = $('authMsg');
  el.className = 'auth-msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}
function hideMsg() { $('authMsg').style.display = 'none'; }

function showLogin() {
  $('loginForm').classList.remove('hidden');
  $('registerForm').classList.add('hidden');
  hideMsg();
  $('loginEmail').value = '';
  $('loginPassword').value = '';
}
function showRegister() {
  $('loginForm').classList.add('hidden');
  $('registerForm').classList.remove('hidden');
  hideMsg();
  $('regEmail').value = '';
  $('regPassword').value = '';
  $('regPasswordConfirm').value = '';
}

// ==================== Auth Logic ====================
async function handleRegister() {
  var email = $('regEmail').value.trim();
  var password = $('regPassword').value;
  var confirm = $('regPasswordConfirm').value;
  
  if (!email || !password) { showMsg('error', '请填写邮箱和密码'); return; }
  if (password.length < 6) { showMsg('error', '密码至少 6 位'); return; }
  if (password !== confirm) { showMsg('error', '两次密码不一致'); return; }
  
  var btn = $('regBtn');
  btn.disabled = true;
  btn.textContent = '注册中...';
  
  try {
    var { data, error } = await supabase.auth.signUp({ email: email, password: password });
    if (error) {
      showMsg('error', '注册失败: ' + error.message);
    } else if (data.user && data.session) {
      // Auto-confirmed - logged in immediately
      showMsg('success', '注册成功，正在进入...');
      setTimeout(function() { window.location.reload(); }, 500);
    } else if (data.user && !data.session) {
      showMsg('info', '注册成功！请查看邮箱确认链接（可能在垃圾邮件中），确认后即可登录。');
      setTimeout(showLogin, 2000);
    }
  } catch(e) {
    showMsg('error', '网络错误: ' + e.message);
  }
  
  btn.disabled = false;
  btn.textContent = '注册';
}

async function handleLogin() {
  var email = $('loginEmail').value.trim();
  var password = $('loginPassword').value;
  
  if (!email || !password) { showMsg('error', '请填写邮箱和密码'); return; }
  
  var btn = $('loginBtn');
  btn.disabled = true;
  btn.textContent = '登录中...';
  
  try {
    var { data, error } = await supabase.auth.signInWithPassword({ email: email, password: password });
    if (error) {
      showMsg('error', '登录失败: ' + error.message);
    }
    // on success, onAuthStateChange will handle it
  } catch(e) {
    showMsg('error', '网络错误: ' + e.message);
  }
  
  btn.disabled = false;
  btn.textContent = '登录';
}

async function handleLogout() {
  await supabase.auth.signOut();
}

// ==================== Data Layer ====================
async function fetchJobs() {
  var { data, error } = await supabase.from('jobs').select('*').order('created_at', { ascending: false });
  if (error) { console.error('fetchJobs:', error); return []; }
  return data || [];
}

async function fetchResumes() {
  var { data, error } = await supabase.from('resumes').select('*').order('created_at', { ascending: false });
  if (error) { console.error('fetchResumes:', error); return []; }
  return data || [];
}

// ==================== Migration ====================
function checkOldData() {
  var oldKeys = [];
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    if (key && key.indexOf('jr_') === 0) oldKeys.push(key);
  }
  if (oldKeys.length === 0) return null;
  
  // Find the most recent user's data
  var sessionUser = localStorage.getItem('jr_current_user');
  var prefix = sessionUser ? 'jr_' + sessionUser + '_' : null;
  
  var oldJobs = [];
  var oldResumes = [];
  
  // Try to get data for the session user first
  if (prefix) {
    try { oldJobs = JSON.parse(localStorage.getItem(prefix + 'jobs') || '[]'); } catch(e) {}
    try { oldResumes = JSON.parse(localStorage.getItem(prefix + 'resumes') || '[]'); } catch(e) {}
  }
  
  // If no session user, try all users
  if (oldJobs.length === 0) {
    for (var j = 0; j < oldKeys.length; j++) {
      var k = oldKeys[j];
      if (k.indexOf('_jobs') > 0) {
        try { oldJobs = JSON.parse(localStorage.getItem(k) || '[]'); } catch(e) {}
        if (oldJobs.length > 0) break;
      }
    }
    for (var r = 0; r < oldKeys.length; r++) {
      var kr = oldKeys[r];
      if (kr.indexOf('_resumes') > 0) {
        try { oldResumes = JSON.parse(localStorage.getItem(kr) || '[]'); } catch(e) {}
        if (oldResumes.length > 0) break;
      }
    }
  }
  
  if (oldJobs.length === 0 && oldResumes.length === 0) return null;
  
  return { jobs: oldJobs, resumes: oldResumes };
}

function showMigrationBanner(oldData) {
  $('migrateCount').textContent = oldData.jobs.length;
  $('migrateResumeCount').textContent = oldData.resumes.length;
  $('migrateBanner').classList.remove('hidden');
  
  $('migrateBtn').onclick = async function() {
    $('migrateBtn').disabled = true;
    $('migrateBtn').textContent = '迁移中...';
    
    var errors = 0;
    
    // Migrate jobs
    for (var i = 0; i < oldData.jobs.length; i++) {
      var j = oldData.jobs[i];
      var { error } = await supabase.from('jobs').insert([{
        company: j.company || '',
        position: j.position || '',
        salary: j.salary || null,
        location: j.location || null,
        date: j.date || null,
        link: j.link || null,
        status: j.status || 'pending',
        contact: j.contact || null,
        interview: j.interview || null,
        notes: j.notes || null
      }]);
      if (error) { console.error('Migrate job error:', error); errors++; }
    }
    
    // Migrate resumes
    for (var k = 0; k < oldData.resumes.length; k++) {
      var r = oldData.resumes[k];
      var { error } = await supabase.from('resumes').insert([{
        version: r.version || '',
        date: r.date || null,
        summary: r.summary || null,
        file_name: r.fileName || null,
        file_data: r.fileData || null
      }]);
      if (error) { console.error('Migrate resume error:', error); errors++; }
    }
    
    if (errors === 0) {
      // Clear old localStorage data
      for (var m = 0; m < localStorage.length; m++) {
        var key = localStorage.key(m);
        if (key && key.indexOf('jr_') === 0) localStorage.removeItem(key);
      }
      $('migrateBanner').classList.add('hidden');
      alert('迁移成功！所有数据已上传到云端。');
    } else {
      alert('迁移完成，但有 ' + errors + ' 条记录失败（已在控制台显示详情）。');
      $('migrateBtn').disabled = false;
      $('migrateBtn').textContent = '重试迁移';
    }
    
    await refreshAll();
  };
  
  $('dismissMigrateBtn').onclick = function() {
    $('migrateBanner').classList.add('hidden');
  };
}

// ==================== Render ====================
async function refreshAll() {
  currentJobs = await fetchJobs();
  currentResumes = await fetchResumes();
  renderAll();
}

function renderAll() {
  renderStats(currentJobs);
  renderJobs();
  renderResumes();
}

function renderStats(jobs) {
  var stats = {
    total: jobs.length,
    pending: jobs.filter(function(j) { return j.status === 'pending'; }).length,
    submitted: jobs.filter(function(j) { return j.status === 'submitted'; }).length,
    interview: jobs.filter(function(j) { return j.status === 'interview'; }).length,
    offer: jobs.filter(function(j) { return j.status === 'offer'; }).length
  };
  $('statsGrid').innerHTML = [
    '<div class="stat-card"><div class="stat-value">' + stats.total + '</div><div class="stat-label">总投递</div></div>',
    '<div class="stat-card"><div class="stat-value">' + stats.pending + '</div><div class="stat-label">待投递</div></div>',
    '<div class="stat-card"><div class="stat-value">' + stats.submitted + '</div><div class="stat-label">已投递</div></div>',
    '<div class="stat-card"><div class="stat-value">' + stats.interview + '</div><div class="stat-label">面试中</div></div>',
    '<div class="stat-card"><div class="stat-value">' + stats.offer + '</div><div class="stat-label">Offer</div></div>'
  ].join('');
}

function renderJobs() {
  var search = ($('jobSearch').value || '').toLowerCase();
  var statusFilter = $('statusFilter').value;
  
  var filtered = currentJobs.filter(function(job) {
    var s = search;
    var matchSearch = !s || (job.company && job.company.toLowerCase().indexOf(s) >= 0) || (job.position && job.position.toLowerCase().indexOf(s) >= 0);
    var matchStatus = !statusFilter || job.status === statusFilter;
    return matchSearch && matchStatus;
  });
  
  var tbody = $('jobsBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暂无投递记录</td></tr>';
    return;
  }
  
  tbody.innerHTML = filtered.map(function(job) {
    return '<tr>' +
      '<td><a style="cursor:pointer;color:var(--primary)" data-action="detail" data-id="' + job.id + '">' + (job.company || '') + '</a></td>' +
      '<td>' + (job.position || '') + '</td>' +
      '<td>' + (job.salary || '-') + '</td>' +
      '<td>' + (job.location || '-') + '</td>' +
      '<td>' + getStatusTag(job.status) + '</td>' +
      '<td>' + (job.date || '-') + '</td>' +
      '<td>' + renderInterviewTags(job.interview) + '</td>' +
      '<td>' + getActionButtons(job) + '</td>' +
      '</tr>';
  }).join('');
  
  // Bind events
  tbody.querySelectorAll('[data-action="detail"]').forEach(function(el) {
    el.onclick = function() { showDetail(parseInt(el.dataset.id)); };
  });
  tbody.querySelectorAll('[data-action="advance"]').forEach(function(el) {
    el.onclick = function() { advanceStatus(parseInt(el.dataset.id)); };
  });
  tbody.querySelectorAll('[data-action="edit-job"]').forEach(function(el) {
    el.onclick = function() { editJob(parseInt(el.dataset.id)); };
  });
  tbody.querySelectorAll('[data-action="delete-job"]').forEach(function(el) {
    el.onclick = function() { deleteJob(parseInt(el.dataset.id)); };
  });
}

function renderInterviewTags(text) {
  if (!text) return '-';
  var parts = text.split('|').map(function(p) { return p.trim(); }).filter(function(p) { return p; });
  if (!parts.length) return '-';
  return '<div class="interview-tags">' + parts.map(function(p) { return '<span class="interview-tag">' + p + '</span>'; }).join('') + '</div>';
}

function getStatusTag(status) {
  var m = { pending: '待投递', submitted: '已投递', screening: '简历初筛', interview: '面试中', offer: 'Offer', accepted: '已接受', rejected: '已拒绝' };
  return '<span class="status-tag status-' + status + '">' + (m[status] || status) + '</span>';
}

function getActionButtons(job) {
  var flows = {
    pending: '投递', submitted: '初筛', screening: '面试', interview: 'Offer'
  };
  var flowLabel = flows[job.status];
  var btns = [];
  if (flowLabel) {
    var cls = job.status === 'screening' ? 'btn-warning' : (job.status === 'pending' ? 'btn-primary' : 'btn-success');
    btns.push('<button class="btn ' + cls + ' btn-sm" data-action="advance" data-id="' + job.id + '">' + flowLabel + '</button>');
  }
  btns.push('<button class="btn btn-secondary btn-sm" data-action="edit-job" data-id="' + job.id + '">编辑</button>');
  btns.push('<button class="btn btn-danger btn-sm" data-action="delete-job" data-id="' + job.id + '">删除</button>');
  return btns.join('');
}

function renderResumes() {
  var list = $('resumesList');
  if (currentResumes.length === 0) {
    list.innerHTML = '<p class="text-center text-muted">暂无简历记录</p>';
    return;
  }
  var sorted = [].concat(currentResumes).sort(function(a, b) { return new Date(b.date || 0) - new Date(a.date || 0); });
  list.innerHTML = sorted.map(function(r) {
    var btns = '';
    if (r.file_data) btns += '<button class="btn btn-success btn-sm" data-action="dl-resume" data-id="' + r.id + '">下载</button>';
    btns += '<button class="btn btn-secondary btn-sm" data-action="edit-resume" data-id="' + r.id + '">编辑</button>';
    btns += '<button class="btn btn-danger btn-sm" data-action="delete-resume" data-id="' + r.id + '">删除</button>';
    return '<div class="resume-item"><div class="resume-info"><div class="resume-version">' + (r.version || '') + '</div><div class="resume-date">' + (r.date || '未设置日期') + '</div>' + (r.summary ? '<div class="resume-summary">' + r.summary + '</div>' : '') + '</div><div class="resume-actions">' + btns + '</div></div>';
  }).join('');
  
  list.querySelectorAll('[data-action="dl-resume"]').forEach(function(el) { el.onclick = function() { downloadResume(parseInt(el.dataset.id)); }; });
  list.querySelectorAll('[data-action="edit-resume"]').forEach(function(el) { el.onclick = function() { editResume(parseInt(el.dataset.id)); }; });
  list.querySelectorAll('[data-action="delete-resume"]').forEach(function(el) { el.onclick = function() { deleteResume(parseInt(el.dataset.id)); }; });
}

// ==================== Job CRUD ====================
function showAddJobModal() {
  $('jobModalTitle').textContent = '添加投递记录';
  $('jobEditId').value = '';
  $('jobCompany').value = '';
  $('jobPosition').value = '';
  $('jobSalary').value = '';
  $('jobLocation').value = '';
  $('jobDate').value = new Date().toISOString().split('T')[0];
  $('jobLink').value = '';
  $('jobStatus').value = 'pending';
  $('jobContact').value = '';
  $('jobInterview').value = '';
  $('jobNotes').value = '';
  $('jobModal').classList.add('active');
}

function editJob(id) {
  var job = currentJobs.find(function(j) { return j.id === id; });
  if (!job) return;
  $('jobModalTitle').textContent = '编辑投递记录';
  $('jobEditId').value = id;
  $('jobCompany').value = job.company || '';
  $('jobPosition').value = job.position || '';
  $('jobSalary').value = job.salary || '';
  $('jobLocation').value = job.location || '';
  $('jobDate').value = job.date || '';
  $('jobLink').value = job.link || '';
  $('jobStatus').value = job.status || 'pending';
  $('jobContact').value = job.contact || '';
  $('jobInterview').value = job.interview || '';
  $('jobNotes').value = job.notes || '';
  $('jobModal').classList.add('active');
}

function closeJobModal() { $('jobModal').classList.remove('active'); }

async function saveJob() {
  var company = $('jobCompany').value.trim();
  var position = $('jobPosition').value.trim();
  if (!company || !position) { alert('请填写公司名称和职位名称'); return; }
  
  var editId = $('jobEditId').value;
  var btn = $('jobSaveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  
  var data = { company: company, position: position, salary: $('jobSalary').value.trim() || null, location: $('jobLocation').value.trim() || null, date: $('jobDate').value || null, link: $('jobLink').value.trim() || null, status: $('jobStatus').value, contact: $('jobContact').value.trim() || null, interview: $('jobInterview').value.trim() || null, notes: $('jobNotes').value.trim() || null, updated_at: new Date().toISOString() };
  
  var error;
  if (editId) { var r = await supabase.from('jobs').update(data).eq('id', parseInt(editId)); error = r.error; }
  else { var r = await supabase.from('jobs').insert([data]); error = r.error; }
  
  btn.disabled = false; btn.textContent = '保存';
  if (error) { alert('保存失败: ' + error.message); return; }
  closeJobModal();
  await refreshAll();
}

async function deleteJob(id) {
  if (!confirm('确定删除？')) return;
  var { error } = await supabase.from('jobs').delete().eq('id', id);
  if (error) { alert('删除失败: ' + error.message); return; }
  await refreshAll();
}

async function advanceStatus(id) {
  var flows = { pending: 'submitted', submitted: 'screening', screening: 'interview', interview: 'offer' };
  var job = currentJobs.find(function(j) { return j.id === id; });
  if (!job || !flows[job.status]) return;
  var { error } = await supabase.from('jobs').update({ status: flows[job.status], updated_at: new Date().toISOString() }).eq('id', id);
  if (error) { alert('操作失败: ' + error.message); return; }
  await refreshAll();
}

function showDetail(id) {
  var job = currentJobs.find(function(j) { return j.id === id; });
  if (!job) return;
  $('detailTitle').textContent = (job.company || '') + ' - ' + (job.position || '');
  $('detailContent').innerHTML = [
    '<div class="form-group"><strong>薪资范围：</strong> ' + (job.salary || '未填写') + '</div>',
    '<div class="form-group"><strong>工作地点：</strong> ' + (job.location || '未填写') + '</div>',
    '<div class="form-group"><strong>投递日期：</strong> ' + (job.date || '未填写') + '</div>',
    '<div class="form-group"><strong>当前状态：</strong> ' + getStatusTag(job.status) + '</div>',
    '<div class="form-group"><strong>投递链接：</strong> ' + (job.link ? '<a href="' + job.link + '" target="_blank">' + job.link + '</a>' : '未填写') + '</div>',
    '<div class="form-group"><strong>联系人：</strong> ' + (job.contact || '未填写') + '</div>',
    '<div class="form-group"><strong>面试记录：</strong><br>' + (renderInterviewTags(job.interview) || '无') + '</div>',
    '<div class="form-group"><strong>备注：</strong><br>' + (job.notes || '无') + '</div>',
    '<div class="text-muted mt-4" style="font-size:12px">最后更新：' + (job.updated_at || '未知') + '</div>'
  ].join('');
  $('detailModal').classList.add('active');
}

function closeDetailModal() { $('detailModal').classList.remove('active'); }

// ==================== Resume CRUD ====================
var currentFileData = null;
var currentFileName = null;

function showAddResumeModal() {
  $('resumeModalTitle').textContent = '新增简历版本';
  $('resumeEditId').value = '';
  $('resumeVersion').value = '';
  $('resumeDate').value = new Date().toISOString().split('T')[0];
  $('resumeSummary').value = '';
  currentFileData = null; currentFileName = null;
  updateFileUI();
  $('resumeModal').classList.add('active');
}

function editResume(id) {
  var r = currentResumes.find(function(x) { return x.id === id; });
  if (!r) return;
  $('resumeModalTitle').textContent = '编辑简历版本';
  $('resumeEditId').value = id;
  $('resumeVersion').value = r.version || '';
  $('resumeDate').value = r.date || '';
  $('resumeSummary').value = r.summary || '';
  currentFileData = r.file_data || null;
  currentFileName = r.file_name || null;
  updateFileUI();
  $('resumeModal').classList.add('active');
}

function closeResumeModal() { $('resumeModal').classList.remove('active'); }

function handleFileSelect(event) {
  var file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('文件过大，不超过5MB'); return; }
  currentFileName = file.name;
  var reader = new FileReader();
  reader.onload = function(e) { currentFileData = e.target.result; updateFileUI(); };
  reader.readAsDataURL(file);
}

function updateFileUI() {
  var area = $('fileUploadArea');
  if (currentFileName) {
    area.classList.add('has-file');
    $('fileUploadText').style.display = 'none';
    $('fileNameDisplay').textContent = '已选择: ' + currentFileName;
  } else {
    area.classList.remove('has-file');
    $('fileUploadText').style.display = '';
    $('fileNameDisplay').textContent = '';
  }
}

async function saveResume() {
  var version = $('resumeVersion').value.trim();
  if (!version) { alert('请填写版本号'); return; }
  var editId = $('resumeEditId').value;
  var btn = $('resumeSaveBtn'); btn.disabled = true; btn.textContent = '保存中...';
  
  var data = { version: version, date: $('resumeDate').value || null, summary: $('resumeSummary').value.trim() || null, file_name: currentFileName, file_data: currentFileData, updated_at: new Date().toISOString() };
  
  var error;
  if (editId) { var r = await supabase.from('resumes').update(data).eq('id', parseInt(editId)); error = r.error; }
  else { var r = await supabase.from('resumes').insert([data]); error = r.error; }
  
  btn.disabled = false; btn.textContent = '保存';
  if (error) { alert('保存失败: ' + error.message); return; }
  closeResumeModal();
  await refreshAll();
}

async function deleteResume(id) {
  if (!confirm('确定删除？')) return;
  var { error } = await supabase.from('resumes').delete().eq('id', id);
  if (error) { alert('删除失败: ' + error.message); return; }
  await refreshAll();
}

function downloadResume(id) {
  var r = currentResumes.find(function(x) { return x.id === id; });
  if (!r || !r.file_data) { alert('没有可下载的文件'); return; }
  var a = document.createElement('a');
  a.href = r.file_data;
  a.download = r.file_name || 'resume.pdf';
  a.click();
}

// ==================== Tab ====================
function switchTab(tab) {
  $('tabJobs').classList.toggle('active', tab === 'jobs');
  $('tabResumes').classList.toggle('active', tab === 'resumes');
  $('jobsTab').classList.toggle('hidden', tab !== 'jobs');
  $('resumesTab').classList.toggle('hidden', tab !== 'resumes');
}

// ==================== App Init ====================
async function showApp(user) {
  $('authPage').style.display = 'none';
  $('appPage').style.display = 'block';
  $('currentUser').textContent = user.email;
  
  await refreshAll();
  
  // Check for old localStorage data to migrate
  var oldData = checkOldData();
  if (oldData) showMigrationBanner(oldData);
}

function showAuthPage() {
  $('appPage').style.display = 'none';
  $('authPage').style.display = 'flex';
}

// ==================== Event Bindings ====================
document.addEventListener('DOMContentLoaded', function() {
  // Auth buttons
  $('loginBtn').onclick = handleLogin;
  $('regBtn').onclick = handleRegister;
  $('logoutBtn').onclick = handleLogout;
  $('switchToRegister').onclick = function(e) { e.preventDefault(); showRegister(); };
  $('switchToLogin').onclick = function(e) { e.preventDefault(); showLogin(); };
  
  // Tab buttons
  $('tabJobs').onclick = function() { switchTab('jobs'); };
  $('tabResumes').onclick = function() { switchTab('resumes'); };
  
  // Job modal
  $('addJobBtn').onclick = showAddJobModal;
  $('closeJobModal').onclick = closeJobModal;
  $('jobSaveBtn').onclick = saveJob;
  
  // Resume modal
  $('addResumeBtn').onclick = showAddResumeModal;
  $('closeResumeModal').onclick = closeResumeModal;
  $('resumeSaveBtn').onclick = saveResume;
  $('resumeFile').onchange = handleFileSelect;
  $('fileUploadArea').onclick = function() { $('resumeFile').click(); };
  
  // Detail modal
  $('closeDetailModal').onclick = closeDetailModal;
  
  // Search/filter
  $('jobSearch').oninput = renderJobs;
  $('statusFilter').onchange = renderJobs;
  
  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
    overlay.onclick = function(e) { if (e.target === overlay) overlay.classList.remove('active'); };
  });
});

// ==================== Auth State ====================
supabase.auth.onAuthStateChange(function(event, session) {
  if (session) {
    showApp(session.user);
  } else {
    showAuthPage();
    currentJobs = [];
    currentResumes = [];
  }
});

// Initial
(async function init() {
  var { data: { session } } = await supabase.auth.getSession();
  if (session) {
    await showApp(session.user);
  } else {
    showAuthPage();
  }
})();

})();
</script>
